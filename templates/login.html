<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — AdmitIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink:#0a0a0f; --paper:#f5f2eb; --gold:#c8a84b; --teal:#1a6b6b; --muted:#5a5a6a; --border:#e0ddd4; --error:#c84b4b; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'DM Sans',sans-serif;
    background:var(--ink);
    color:var(--paper);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem;
  }
  .login-card{
    background:var(--paper);
    color:var(--ink);
    border-radius:24px;
    padding:2.5rem;
    width:100%;
    max-width:420px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .logo{
    font-family:'Syne',sans-serif;
    font-weight:800;
    font-size:1.5rem;
    text-decoration:none;
    color:var(--ink);
  }
  .logo span{color:var(--gold);}
  .login-title{
    font-family:'Syne',sans-serif;
    font-size:1.6rem;
    font-weight:700;
    margin:1.5rem 0 0.3rem;
    letter-spacing:-0.5px;
  }
  .login-sub{
    color:var(--muted);
    font-size:0.88rem;
    margin-bottom:2rem;
  }
  .form-group{margin-bottom:1.2rem;}
  label{
    display:block;
    font-size:0.82rem;
    font-weight:500;
    color:var(--muted);
    margin-bottom:0.4rem;
  }
  input{
    width:100%;
    border:1.5px solid var(--border);
    border-radius:10px;
    padding:0.75rem 1rem;
    font-family:'DM Sans',sans-serif;
    font-size:0.95rem;
    color:var(--ink);
    background:#fff;
    outline:none;
    transition:border-color 0.2s;
  }
  input:focus{border-color:var(--teal);}
  .error-msg{
    background:rgba(200,75,75,0.1);
    border:1px solid rgba(200,75,75,0.3);
    color:var(--error);
    padding:0.7rem 1rem;
    border-radius:8px;
    font-size:0.85rem;
    margin-bottom:1rem;
  }
  .btn-login{
    width:100%;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:100px;
    padding:0.9rem;
    font-family:'DM Sans',sans-serif;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    transition:background 0.2s;
    margin-top:0.5rem;
  }
  .btn-login:hover{background:var(--teal);}
  .hint{
    background:rgba(26,107,107,0.08);
    border:1px solid rgba(26,107,107,0.2);
    border-radius:10px;
    padding:0.8rem 1rem;
    font-size:0.8rem;
    color:var(--teal);
    margin-top:1.5rem;
  }
  .back-link{
    display:block;
    text-align:center;
    margin-top:1rem;
    color:var(--muted);
    font-size:0.85rem;
    text-decoration:none;
  }
  .back-link:hover{color:var(--ink);}
</style>
</head>
<body>

<div class="login-card">

  <a class="logo" href="/">Admit<span>IQ</span></a>

  <div class="login-title">Admin Login</div>

  <div class="login-sub">
    Access the admission management dashboard to review student applications,
    monitor admission decisions, and manage records.
  </div>

  <div class="error-msg">
    ⚠ Invalid username or password. Please enter correct login details.
  </div>

  <form method="POST">

    <div class="form-group">
      <label>Username</label>
      <input
        type="text"
        name="username"
        placeholder="Enter admin username"
        required
        autocomplete="username">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        name="password"
        placeholder="Enter secure password"
        required
        autocomplete="current-password">
    </div>

    <button type="submit" class="btn-login">
      Sign In →
    </button>

  </form>

  <a class="back-link" href="/">
    ← Back to Home
  </a>

</div>

</body>
</html>
